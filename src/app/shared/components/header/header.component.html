<header class="cv-header">
  <img 
    [src]="'assets/avater.jpg'" 
    alt="Deboraj Roy"
    class="avatar"
    loading="lazy"
    (error)="$event.target.src = 'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27110%27 height=%27110%27%3E%3Crect fill=%271d4f8a%27 width=%27110%27 height=%27110%27/%3E%3Ctext x=%2750%25%27 y=%2754%25%27 font-size=%2744%27 fill=%27white%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27 font-family=%27serif%27%3EDR%3C/text%3E%3C/svg%3E'"
  />

  <div class="header-text">
    <h1>{{ cv.name }}</h1>
    <p class="headline">{{ cv.title }}</p>
    <p class="summary">{{ cv.summary }}</p>

    <nav class="contact-row" aria-label="Contact information">
      <a 
        *ngFor="let contact of cv.contact"
        [href]="contact.href"
        [target]="contact.href.startsWith('mailto:') || contact.href.startsWith('tel:') ? null : '_blank'"
        [rel]="contact.href.startsWith('mailto:') || contact.href.startsWith('tel:') ? null : 'noopener'"
      >
        <i 
          [ngClass]="isBrandIcon(contact.label) ? getIcon(contact.label) : 'fas ' + getIcon(contact.label)"
          aria-hidden="true"
        ></i>
        {{ contact.label }}
      </a>
    </nav>
  </div>
</header>
