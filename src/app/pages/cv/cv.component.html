<main class="cv-page" *ngIf="cv$ | async as cv">
	<header class="cv-meta">
		<h1>{{ cv.name }}</h1>
		<p>{{ cv.title }}</p>
	</header>

	<section>
		<h2>Contact</h2>
		<ul>
			<li *ngFor="let contact of cv.contact">
				<a [href]="contact.href" [target]="contact.href.startsWith('mailto:') || contact.href.startsWith('tel:') ? null : '_blank'" [rel]="contact.href.startsWith('mailto:') || contact.href.startsWith('tel:') ? null : 'noopener'">
					{{ contact.label }}
				</a>
			</li>
		</ul>
	</section>

	<section>
		<h2>Summary</h2>
		<p>{{ cv.summary }}</p>
	</section>

	<section>
		<h2>Experience</h2>
		<article *ngFor="let exp of cv.experience">
			<h3>{{ exp.title }} - {{ exp.org }}</h3>
			<p>{{ exp.location }} | {{ exp.dates }}</p>
			<ul>
				<li *ngFor="let bullet of exp.bullets">{{ bullet }}</li>
			</ul>
		</article>
	</section>

	<section>
		<h2>Projects</h2>
		<article *ngFor="let project of cv.projects">
			<h3>{{ project.title }}</h3>
			<ul>
				<li *ngFor="let bullet of project.bullets">{{ bullet }}</li>
			</ul>
		</article>
	</section>
</main>
