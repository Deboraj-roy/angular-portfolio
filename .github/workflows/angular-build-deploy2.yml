name: Angular Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Add permissions for the GITHUB_TOKEN
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test -- --watch=false --browsers=ChromeHeadless
    
    - name: Build production
      run: npx ng build --configuration=production --base-href=/angular-portfolio/
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/angular-portfolio/browser/
        retention-days: 7

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    
    - name: Deploy to prod branch
      run: |
        git config --global user.name 'DEBORAJ ROY'
        git config --global user.email 'deborajroy123@gmail.com'
        
        # Create or update prod branch
        git fetch origin prod || true
        git checkout -b prod origin/prod 2>/dev/null || git checkout --orphan prod
        
        # Clean and prepare for new build
        git rm -rf . 2>/dev/null || true
        cp -r dist/* .
        touch .nojekyll
        
        # Add all files
        git add .
        
        # Commit and push
        if git diff --staged --quiet; then
          echo "No changes to deploy"
        else
          git commit -m "Deploy to prod branch - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin prod --force
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}